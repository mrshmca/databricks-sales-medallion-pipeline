# The main pipeline for sales_medallion_pipeline

resources:
  pipelines:
    sales_medallion_pipeline_etl:
      name: ${bundle.target}_sales_medallion_pipeline_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/sales_medallion_pipeline_etl"

      libraries:
        - glob:
            include: ../src/sales_medallion_pipeline_etl/bronze/**
        - glob:
            include: ../src/sales_medallion_pipeline_etl/silver/**
        - glob:
            include: ../src/sales_medallion_pipeline_etl/gold/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
